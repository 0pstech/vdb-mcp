# Smithery hosted deployment config.
# Docs: https://smithery.ai/docs/build/deployments/custom-container
#
# runtime "container": Smithery builds the Dockerfile and runs it with
# PORT=8081; the container must serve streamable HTTP at /mcp (implemented
# in vdb_mcp.server.main_http — auto-selected when PORT is set). User
# session config below arrives as query parameters on /mcp requests.
runtime: "container"
build:
  dockerfile: "Dockerfile"
  dockerBuildPath: "."
startCommand:
  type: "http"
  configSchema:
    type: object
    properties:
      vdbApiUrl:
        type: string
        title: VDB instance URL
        description: Origin of the VDB instance to query. Leave default for the hosted service.
        default: https://vdb.ai.kr
      vdbApiToken:
        type: string
        title: VDB API key (optional)
        description: vdb_… key for unmetered per-account access. Free at https://vdb.ai.kr/signup. Without it, calls share the host's anonymous per-IP trial.
  exampleConfig:
    vdbApiUrl: https://vdb.ai.kr
